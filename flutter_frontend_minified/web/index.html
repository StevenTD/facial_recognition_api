<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="flutter_face_recognition">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>flutter_face_recognition</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!-- MediaPipe Face Mesh -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>

  <script>
    window.faceMeshReady = false;
    window.initFaceMesh = async function() {
      if (window.faceMeshInstance) return;
      
      console.log("Starting FaceMesh Download...");
      const faceMesh = new FaceMesh({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`,
      });

      faceMesh.setOptions({
        maxNumFaces: 1,
        refineLandmarks: true,
        minDetectionConfidence: 0.5,
        minTrackingConfidence: 0.5,
      });

      // Warm up the engine
      await faceMesh.initialize();

      faceMesh.onResults((results) => {
        window.faceMeshResults = results;
        if (window.onFaceMeshResults) {
          window.onFaceMeshResults(JSON.stringify(results.multiFaceLandmarks));
        }
      });

      window.faceMeshInstance = faceMesh;
      window.faceMeshReady = true;
      console.log("FaceMesh Engine Ready");
    };

    window.sendToFaceMesh = async function(videoElementId) {
      if (!window.faceMeshInstance) return;
      
      let video = document.getElementById(videoElementId);
      if (!video) {
        video = document.querySelector('video');
      }

      // ONLY send if video is ready and has dimensions
      if (video && video.readyState >= 2 && video.videoWidth > 0 && video.videoHeight > 0) {
        try {
          await window.faceMeshInstance.send({ image: video });
        } catch (e) {
          console.error("FaceMesh send error:", e);
        }
      }
    };
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
